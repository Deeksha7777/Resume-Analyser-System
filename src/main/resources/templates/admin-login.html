<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Resume Analyzer</title>
    <style>
        :root {
            --bg-start: #f5efe6;
            --bg-end: #ecfccb;
            --card: rgba(255, 255, 255, 0.9);
            --text: #1f2937;
            --muted: #6b7280;
            --accent: #166534;
            --accent-dark: #14532d;
            --danger: #b91c1c;
            --border: rgba(20, 83, 45, 0.15);
            --shadow: 0 24px 60px rgba(31, 41, 55, 0.14);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text);
            background:
                    radial-gradient(circle at top right, rgba(34, 197, 94, 0.16), transparent 24%),
                    radial-gradient(circle at left center, rgba(22, 101, 52, 0.14), transparent 26%),
                    linear-gradient(145deg, var(--bg-start), var(--bg-end));
            display: grid;
            place-items: center;
            padding: 24px;
        }

        .card {
            width: min(560px, 100%);
            background: var(--card);
            border-radius: 26px;
            padding: 38px;
            border: 1px solid rgba(255, 255, 255, 0.55);
            box-shadow: var(--shadow);
            backdrop-filter: blur(10px);
        }

        h1 {
            margin: 0 0 10px;
            font-size: 2.2rem;
        }

        .subtext {
            margin: 0 0 26px;
            color: var(--muted);
            line-height: 1.6;
        }

        .alert {
            padding: 12px 14px;
            border-radius: 14px;
            margin-bottom: 16px;
            font-size: 0.95rem;
            background: rgba(185, 28, 28, 0.08);
            color: var(--danger);
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            margin-bottom: 18px;
            border: 1px solid var(--border);
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.96);
            font-size: 1rem;
            outline: none;
        }

        input:focus {
            border-color: rgba(22, 101, 52, 0.45);
            box-shadow: 0 0 0 4px rgba(22, 101, 52, 0.12);
        }

        button {
            width: 100%;
            border: 0;
            border-radius: 14px;
            padding: 15px 18px;
            background: linear-gradient(135deg, var(--accent), var(--accent-dark));
            color: #fff;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
        }

        .footer-link {
            margin-top: 18px;
            text-align: center;
            color: var(--muted);
        }

        .footer-link a {
            color: var(--accent-dark);
            text-decoration: none;
            font-weight: 700;
        }

        @media (max-width: 640px) {
            .card {
                padding: 28px 22px;
            }

            h1 {
                font-size: 1.9rem;
            }
        }
    </style>
</head>
<body>
<div class="card">
    <h1>Admin Access</h1>
    <p class="subtext">Sign in with admin credentials to manage users and their records.</p>

    <div class="alert" th:if="${error}" th:text="${error}"></div>

    <form th:action="@{/admin/login}" method="post">
        <label for="email">Admin Email</label>
        <input id="email" type="email" name="email" placeholder="admin@resumeanalyzer.com" required>

        <label for="password">Admin Password</label>
        <input id="password" type="password" name="password" placeholder="Enter admin password" required>

        <button type="submit">Login as Admin</button>
    </form>

    <p class="footer-link">Back to user login: <a th:href="@{/login}">User Login</a></p>
</div>
</body>
</html>
